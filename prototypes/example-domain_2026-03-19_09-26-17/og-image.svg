<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Example Domain Mobile Lead Surface</title>
  <desc id="desc">Elinext prototype concept for turning the Example Domain placeholder page into a mobile-ready lead surface.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#faf6f1"/>
      <stop offset="100%" stop-color="#e3d3c2"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#c65834"/>
      <stop offset="100%" stop-color="#8b3419"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1060" cy="110" r="180" fill="#c65834" opacity="0.08"/>
  <circle cx="130" cy="560" r="200" fill="#17242d" opacity="0.08"/>
  <rect x="72" y="76" width="1056" height="478" rx="32" fill="#fffaf3" stroke="#e5d7ca"/>
  <text x="120" y="162" fill="#8b3419" font-family="Georgia, serif" font-size="28" font-weight="700" letter-spacing="2">ELINEXT MOBILE PROTOTYPE</text>
  <text x="120" y="250" fill="#17242d" font-family="Georgia, serif" font-size="72" font-weight="700">Example Domain</text>
  <text x="120" y="324" fill="#566672" font-family="Arial, sans-serif" font-size="30">Minimal page. Clearer CTA. Mobile-safe conversion framing.</text>
  <rect x="120" y="388" width="300" height="62" rx="31" fill="url(#accent)"/>
  <text x="171" y="428" fill="#ffffff" font-family="Arial, sans-serif" font-size="28" font-weight="700">Talk to Elinext</text>
  <rect x="792" y="132" width="220" height="348" rx="28" fill="#17242d"/>
  <rect x="808" y="150" width="188" height="312" rx="22" fill="#f4e4d8"/>
  <rect x="856" y="169" width="92" height="8" rx="4" fill="#b8a999"/>
  <rect x="830" y="204" width="144" height="28" rx="14" fill="#efd4c6"/>
  <rect x="830" y="250" width="144" height="48" rx="18" fill="#c65834"/>
  <rect x="830" y="322" width="144" height="14" rx="7" fill="#d3c5b6"/>
  <rect x="830" y="350" width="144" height="14" rx="7" fill="#d3c5b6"/>
  <rect x="830" y="394" width="144" height="48" rx="18" fill="#ffffff" stroke="#d9cabb"/>
</svg>
