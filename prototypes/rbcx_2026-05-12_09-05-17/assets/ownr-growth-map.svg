<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">Ownr growth pressure map</title>
  <desc id="desc">A proposal graphic showing the path from Ownr growth signals to product, QA, and customer experience workstreams.</desc>
  <rect width="980" height="560" fill="#f7f8fb"/>
  <rect x="38" y="38" width="904" height="484" rx="8" fill="#ffffff" stroke="#d7ddea"/>
  <text x="72" y="90" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#16233f">Ownr growth pressure map</text>
  <text x="72" y="122" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#5b6578">How CX demand turns into targeted product and engineering work</text>
  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="72" y="170" width="210" height="118" rx="8" fill="#eef4ff" stroke="#9db8ef"/>
    <text x="94" y="206" font-size="16" font-weight="700" fill="#0051a5">Growth signal</text>
    <text x="94" y="234" font-size="13" fill="#27364d">230k+ entrepreneurs</text>
    <text x="94" y="258" font-size="13" fill="#27364d">CX hiring for Ownr</text>
    <path d="M 292 229 L 376 229" stroke="#6b7890" stroke-width="3"/>
    <path d="M 376 229 L 362 220 L 362 238 Z" fill="#6b7890"/>
    <rect x="392" y="140" width="228" height="88" rx="8" fill="#fff8d7" stroke="#e6c958"/>
    <text x="414" y="174" font-size="16" font-weight="700" fill="#5b4800">Support load</text>
    <text x="414" y="202" font-size="13" fill="#463d19">Banking handoff, renewals, filings</text>
    <rect x="392" y="260" width="228" height="88" rx="8" fill="#f2ecff" stroke="#b49be8"/>
    <text x="414" y="294" font-size="16" font-weight="700" fill="#4a2ca0">Release risk</text>
    <text x="414" y="322" font-size="13" fill="#3d3555">Secure web app, Okta, documents</text>
    <path d="M 630 184 L 714 184" stroke="#6b7890" stroke-width="3"/>
    <path d="M 714 184 L 700 175 L 700 193 Z" fill="#6b7890"/>
    <path d="M 630 304 L 714 304" stroke="#6b7890" stroke-width="3"/>
    <path d="M 714 304 L 700 295 L 700 313 Z" fill="#6b7890"/>
    <rect x="732" y="118" width="176" height="100" rx="8" fill="#eaf8f0" stroke="#8dd6aa"/>
    <text x="754" y="154" font-size="16" font-weight="700" fill="#08723e">CX-to-product</text>
    <text x="754" y="182" font-size="13" fill="#214434">Turn tickets into fixes</text>
    <rect x="732" y="254" width="176" height="100" rx="8" fill="#eaf8f0" stroke="#8dd6aa"/>
    <text x="754" y="290" font-size="16" font-weight="700" fill="#08723e">QA release gates</text>
    <text x="754" y="318" font-size="13" fill="#214434">Automate critical journeys</text>
    <rect x="244" y="406" width="492" height="56" rx="8" fill="#16233f"/>
    <text x="346" y="441" font-size="16" font-weight="700" fill="#ffffff">Elinext pod: delivery + QA automation</text>
  </g>
</svg>
