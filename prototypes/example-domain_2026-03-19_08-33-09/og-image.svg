<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Example Domain Mobile Conversion Concept</title>
  <desc id="desc">A warm editorial-style preview card for the Example Domain mobile conversion concept by Elinext.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f4ee"/>
      <stop offset="55%" stop-color="#efe3d5"/>
      <stop offset="100%" stop-color="#e4d0bb"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffdf8" stop-opacity="0.96"/>
      <stop offset="100%" stop-color="#f4ebe0" stop-opacity="0.96"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="170" cy="130" r="160" fill="#bf5b3d" opacity="0.12"/>
  <circle cx="1040" cy="540" r="180" fill="#14212c" opacity="0.08"/>
  <rect x="72" y="72" width="1056" height="486" rx="34" fill="url(#panel)" stroke="#14212c" stroke-opacity="0.12"/>
  <text x="126" y="160" fill="#bf5b3d" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="700" letter-spacing="2">ELINEXT MOBILE CONCEPT</text>
  <text x="126" y="254" fill="#14212c" font-family="Georgia, 'Times New Roman', serif" font-size="78" font-weight="700">Example Domain</text>
  <text x="126" y="326" fill="#14212c" font-family="Georgia, 'Times New Roman', serif" font-size="78" font-weight="700">Reframed For Action</text>
  <text x="126" y="394" fill="#586773" font-family="Arial, Helvetica, sans-serif" font-size="30">A mobile-ready, analytics-aware prototype for a minimal public page.</text>
  <rect x="126" y="446" width="312" height="58" rx="29" fill="#bf5b3d"/>
  <text x="166" y="484" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Explore The Prototype</text>
</svg>
